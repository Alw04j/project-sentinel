{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card bg-dark border-secondary p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <h2 class="text-primary"><i class="fas fa-user-shield"></i> SENTINEL</h2>
            <p class="text-white-50 small">Access Control Protocol Active</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="text-light mb-3 auth-form-styling">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Authorize Entry</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'signup' %}" class="text-info small text-decoration-none">New Analyst? Create Account</a>
        </div>
    </div>
</div>

<style>
    .auth-form-styling input { 
        width: 100%; padding: 8px; background: #1a1a1a; 
        border: 1px solid #444; color: white; border-radius: 4px;
    }
</style>
{% endblock %}
